<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tonalite</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <header class="site-header">
    <h1>Tonalite</h1>
    <div class="root-selector">
      <select id="rootSelect">
        <option value="" disabled selected>Tonalite...</option>
      </select>
    </div>
  </header>

  <nav class="tabs">
    <button class="active" data-tab="theory">Theorie</button>
    <button data-tab="tools">Outils</button>
  </nav>

  <!-- Theorie -->
  <div id="theory" class="tab-content active">
    <div class="subtabs">
      <button class="active" data-sub="theory-scales">Gammes</button>
      <button data-sub="theory-harmony">Harmonisation</button>
      <button data-sub="theory-qualities">Enrichissements</button>
    </div>
    <div id="theory-scales" class="sub-content active">
      <div class="table-wrap">
        <table id="scaleTable">
          <thead>
            <tr>
              <th>Tonique</th>
              <th>I</th><th>II</th><th>III</th><th>IV</th><th>V</th><th>VI</th><th>VII</th>
              <th class="sortable" id="sortAlt">Alt. <span class="sort-arrow">&#9650;</span></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
    <div id="theory-harmony" class="sub-content">
      <div class="mode-toggle" id="modeToggle">
        <button class="active" data-mode="major">Majeur</button>
        <button data-mode="minor">Mineur</button>
      </div>
      <div class="mode-toggle" id="voicingToggle">
        <button class="active" data-voicing="triad">Triade</button>
        <button data-voicing="tetrad">Tetrade</button>
      </div>
      <div id="harmonyResult"></div>
    </div>
    <div id="theory-qualities" class="sub-content">
      <div class="mode-toggle" id="qualitiesMode">
        <button class="active" data-mode="major">Majeur</button>
        <button data-mode="minor">Mineur</button>
      </div>
      <div id="qualitiesResult"></div>
    </div>
  </div>

  <!-- Outils -->
  <div id="tools" class="tab-content">
    <div class="subtabs">
      <button class="active" data-sub="tools-scale">Gamme</button>
      <button data-sub="tools-chords">Accords</button>
      <button data-sub="tools-quiz">Quiz</button>
    </div>
    <div class="fret-range" id="fretRange">
      <span>Frettes</span>
      <select id="fretFrom"></select>
      <span>a</span>
      <select id="fretTo"></select>
    </div>
    <div id="tools-scale" class="sub-content active">
      <div class="scale-config">
        <span class="config-label">Type</span>
        <select id="scaleTypeSelect"></select>
      </div>
      <div id="scaleResult"></div>
      <div class="overlay-section">
        <button class="overlay-btn" id="overlayBtn">+ Comparer</button>
        <div class="overlay-controls" id="overlayControls" style="display:none">
          <select id="overlayRoot"></select>
          <select id="overlayType"></select>
        </div>
        <div id="overlayScaleResult"></div>
      </div>
      <div id="scaleFretResult"></div>
    </div>
    <div id="tools-chords" class="sub-content">
      <div class="mode-toggle" id="chordVoicingToggle">
        <button class="active" data-voicing="triad">Triade</button>
        <button data-voicing="tetrad">Tetrade</button>
      </div>
      <div class="mode-toggle" id="chordDisplayToggle">
        <button class="active" data-display="notes">Notes</button>
        <button data-display="intervals">Intervalles</button>
      </div>
      <div id="chordDegreePicker" class="chord-degree-picker"></div>
      <div id="chordInfo" class="chord-info" style="display:none;"></div>
      <div id="chordFretResult"></div>
    </div>
    <div id="tools-quiz" class="sub-content">
      <div class="quiz-filter">
        <label class="quiz-filter-label">Tonalite :</label>
        <div class="quiz-filter-options" id="quizFilter"></div>
      </div>
      <div class="quiz-score" id="quizScore">Score : 0 / 0</div>
      <div class="quiz-prompt" id="quizPrompt"></div>
      <div class="quiz-choices" id="quizChoices"></div>
      <button class="quiz-next" id="quizNext">Nouvelle question</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
